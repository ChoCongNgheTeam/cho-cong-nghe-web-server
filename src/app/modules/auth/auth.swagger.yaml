paths:
  /auth/register:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - email
                - password
                - fullName
                - phone
                - gender
                - role
              properties:
                userName:
                  type: string
                  example: user123
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password123
                fullName:
                  type: string
                  example: Nguyễn Văn A
                phone:
                  type: string
                  example: "0123456789"
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                  example: MALE
                role:
                  type: string
                  enum: [ADMIN, CUSTOMER, SELLER]
                  example: CUSTOMER
      responses:
        "201":
          description: Đăng ký thành công
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email hoặc username đã tồn tại

  /auth/login:
    post:
      summary: Đăng nhập
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Đăng nhập thành công
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      user:
                        type: object
                        # Có thể $ref tới schema User nếu bạn định nghĩa
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Email hoặc mật khẩu không đúng
