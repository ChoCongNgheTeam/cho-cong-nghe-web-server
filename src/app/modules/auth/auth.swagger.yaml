paths:
  /auth/register:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - email
                - password
                - fullName
                - phone
              properties:
                userName:
                  type: string
                  minLength: 3
                  maxLength: 30
                  pattern: "^[a-zA-Z0-9_]+$"
                  description: Tên đăng nhập (chỉ chữ, số và gạch dưới)
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                  pattern: "^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d@$!%*?&]+$"
                  description: Phải có chữ hoa, số và không chứa ký tự có dấu
                fullName:
                  type: string
                  minLength: 3
                  maxLength: 100
                phone:
                  type: string
                  pattern: "^0\\d{9}$"
                  description: Số điện thoại Việt Nam (10 số, bắt đầu bằng 0)
            example:
              userName: "user123"
              email: "user@example.com"
              password: "Password123"
              fullName: "Nguyễn Văn A"
              phone: "0123456789"
      responses:
        "201":
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      accessToken:
                        type: string
              example:
                message: "Đăng ký thành công"
                data:
                  user:
                    id: "545528af-0b9c-4fe4-bbad-45965e067e06"
                    userName: "user123"
                    email: "user@example.com"
                    fullName: "Nguyễn Văn A"
                    phone: "0123456789"
                    role: "CUSTOMER"
                    createdAt: "2025-12-23T13:04:43.506Z"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email hoặc username đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Email hoặc tên đăng nhập đã được sử dụng"

  /auth/login:
    post:
      summary: Đăng nhập
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - password
              properties:
                userName:
                  type: string
                password:
                  type: string
                  format: password
            example:
              userName: "user123"
              password: "Password123"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      accessToken:
                        type: string
              example:
                message: "Đăng nhập thành công"
                data:
                  user:
                    id: "545528af-0b9c-4fe4-bbad-45965e067e06"
                    userName: "user123"
                    email: "user@example.com"
                    fullName: "Nguyễn Văn A"
                    phone: "0123456789"
                    gender: "MALE"
                    role: "CUSTOMER"
                    isActive: true
                    avatarImage: null
                    createdAt: "2025-12-23T13:04:43.506Z"
                    updatedAt: "2025-12-23T13:04:43.506Z"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Email hoặc mật khẩu không đúng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Email hoặc mật khẩu không đúng"

  /auth/logout:
    post:
      summary: Đăng xuất
      tags: [Auth]
      description: Đăng xuất người dùng hiện tại (thường là invalidate refresh token hoặc blacklist access token nếu có cơ chế)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Đăng xuất thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/refresh:
    post:
      summary: Làm mới access token
      tags: [Auth]
      description: Sử dụng refresh token để lấy access token mới (thường refresh token được gửi qua cookie hoặc body)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Refresh token (nếu không gửi qua cookie)
            example:
              refreshToken: "refresh-token-string"
      responses:
        "200":
          description: Làm mới token thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        description: Access token mới
              example:
                message: "Làm mới token thành công"
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: Refresh token không hợp lệ hoặc hết hạn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Refresh token không hợp lệ hoặc đã hết hạn"

  /auth/forgot-password:
    post:
      summary: Yêu cầu đặt lại mật khẩu
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
            example:
              email: "user@example.com"
      responses:
        "200":
          description: Yêu cầu thành công (dù email có tồn tại hay không để tránh lộ thông tin)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Nếu email tồn tại, link reset đã được gửi"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          description: Quá nhiều yêu cầu (rate limit)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Quá nhiều yêu cầu đặt lại mật khẩu. Vui lòng thử lại sau 15 phút."

  /auth/reset-password:
    get:
      summary: Xác thực token reset password và redirect về frontend
      tags: [Auth]
      description: |
        Endpoint này nhận token qua query params và redirect người dùng về trang reset password trên frontend.
        Không trả về JSON mà redirect trực tiếp.
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: Token đặt lại mật khẩu
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "302":
          description: Redirect đến trang reset password trên frontend
        "400":
          description: Token không hợp lệ hoặc thiếu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Token không hợp lệ"

    post:
      summary: Đặt lại mật khẩu mới
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
                - confirmPassword
              properties:
                token:
                  type: string
                  description: Token nhận từ email reset password
                password:
                  type: string
                  minLength: 6
                  pattern: "^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d@$!%*?&]+$"
                  description: Mật khẩu mới (phải có chữ hoa, số)
                confirmPassword:
                  type: string
                  format: password
            example:
              token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              password: "NewPassword123"
              confirmPassword: "NewPassword123"
      responses:
        "200":
          description: Đặt lại mật khẩu thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Đặt lại mật khẩu thành công"
        "400":
          $ref: "#/components/responses/ValidationError"
        "410":
          description: Token đã hết hạn hoặc đã được sử dụng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Token đã hết hạn hoặc đã được sử dụng"

  /auth/change-password:
    post:
      summary: Đổi mật khẩu (người dùng đã đăng nhập)
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Mật khẩu hiện tại
                newPassword:
                  type: string
                  minLength: 6
                  pattern: "^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d@$!%*?&]+$"
                  description: Mật khẩu mới (phải có chữ hoa, số)
                confirmPassword:
                  type: string
                  description: Xác nhận mật khẩu mới (phải trùng với newPassword)
            example:
              currentPassword: "OldPassword123"
              newPassword: "NewPassword123"
              confirmPassword: "NewPassword123"
      responses:
        "200":
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Đổi mật khẩu thành công"
        "400":
          description: Dữ liệu không hợp lệ hoặc mật khẩu không khớp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidData:
                  value:
                    message: "Dữ liệu không hợp lệ"
                    errors:
                      newPassword: "Mật khẩu phải có ít nhất 6 ký tự"
                passwordMismatch:
                  value:
                    message: "Mật khẩu mới và xác nhận không khớp"
                wrongPassword:
                  value:
                    message: "Mật khẩu hiện tại không đúng"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, ADMIN, STAFF]
        isActive:
          type: boolean
        avatarImage:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: string

  responses:
    UnauthorizedError:
      description: Chưa xác thực hoặc token không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Không có token, truy cập bị từ chối"

    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Dữ liệu không hợp lệ"
            errors:
              email: "Email không hợp lệ"
              password: "Mật khẩu phải có chữ hoa, số và không chứa ký tự có dấu"
              phone: "Số điện thoại không hợp lệ"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token (không cần thêm 'Bearer ' ở đầu)"
