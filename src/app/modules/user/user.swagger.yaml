paths:
  /users/me:
    get:
      summary: Lấy thông tin cá nhân của người dùng hiện tại
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
              example:
                data:
                  id: "545528af-0b9c-4fe4-bbad-45965e067e06"
                  userName: "khanhduy23"
                  email: "lukila@gmail.com"
                  fullName: "Nguyễn Văn A"
                  phone: "0123456789"
                  gender: "MALE"
                  role: "CUSTOMER"
                  isActive: true
                  avatarImage: null
                  createdAt: "2025-12-23T13:04:43.506Z"
                  updatedAt: "2025-12-23T13:43:10.118Z"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      summary: Cập nhật thông tin cá nhân (profile)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
                  message:
                    type: string
              example:
                message: "Cập nhật hồ sơ cá nhân thành công"
                data:
                  id: "545528af-0b9c-4fe4-bbad-45965e067e06"
                  # ... các field khác
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /users/me/change-password:
    patch:
      summary: Đổi mật khẩu cá nhân
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 6
                  pattern: "^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d@$!%*?&]+$"
      responses:
        "200":
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Đổi mật khẩu thành công"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Mật khẩu cũ không đúng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/admin:
    get:
      summary: Lấy danh sách tất cả người dùng (bao gồm phân trang, lọc)
      description: STAFF và ADMIN được phép truy cập
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: search
          schema: { type: string }
          description: Tìm theo username, email, fullName
        - in: query
          name: role
          schema:
            type: string
            enum: [CUSTOMER, STAFF, ADMIN]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /users/admin/{id}:
    get:
      summary: Lấy chi tiết một người dùng
      description: STAFF và ADMIN được phép
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
                  message:
                    type: string
        "401": ...
        "403": ...
        "404": ...

    patch:
      summary: Cập nhật thông tin người dùng
      description: Chỉ ADMIN được phép
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200": ...
        "400": ...
        "401": ...
        "403": ...
        "404": ...
        "409": ...

    delete:
      summary: Soft delete người dùng
      description: STAFF chỉ xóa được CUSTOMER, ADMIN xóa được mọi role (trừ chính mình)
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Soft delete thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Người dùng đã được đưa vào thùng rác"
        "401": ...
        "403": ...
        "404": ...

  /users/admin/{id}/restore:
    post:
      summary: Khôi phục người dùng từ thùng rác
      description: Chỉ ADMIN
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Khôi phục thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401": ...
        "403": ...
        "404": ...

  /users/admin/{id}/permanent:
    delete:
      summary: Xóa vĩnh viễn người dùng (hard delete)
      description: Chỉ ADMIN - chỉ được thực hiện sau khi đã soft delete
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Xóa vĩnh viễn thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401": ...
        "403": ...
        "404": ...

  /users/admin/trash/users:
    get:
      summary: Lấy danh sách người dùng đã bị soft delete (trash)
      description: Chỉ ADMIN
      tags: [Users - Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                  message:
                    type: string
        "401": ...
        "403": ...

  # ────────────────────────────────────────────────
components:
  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        userName: { type: string }
        email: { type: string, format: email }
        fullName: { type: string }
        phone: { type: string, nullable: true }
        gender: { type: string, enum: [MALE, FEMALE, OTHER], nullable: true }
        role: { type: string, enum: [CUSTOMER, STAFF, ADMIN] }
        isActive: { type: boolean }
        avatarImage: { type: string, format: uri, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    UpdateProfileRequest:
      type: object
      properties:
        fullName: { type: string, minLength: 3, maxLength: 100 }
        phone: { type: string, pattern: "^0\\d{9}$" }
        gender: { type: string, enum: [MALE, FEMALE, OTHER] }
        avatarImage: { type: string, format: uri }

    UpdateUserRequest:
      type: object
      properties:
        userName: { type: string, minLength: 3, maxLength: 30 }
        email: { type: string, format: email }
        fullName: { type: string }
        phone: { type: string }
        gender: { type: string, enum: [MALE, FEMALE, OTHER] }
        role: { type: string, enum: [CUSTOMER, STAFF, ADMIN] }
        isActive: { type: boolean }
        avatarImage: { type: string, format: uri }

    # Các schema ErrorResponse, UpdateProfileRequest... giữ nguyên hoặc thêm nếu cần

  responses:
    UnauthorizedError:
      description: Chưa đăng nhập / token không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Không có token, truy cập bị từ chối"

    ForbiddenError:
      description: Không có quyền truy cập
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Bạn không có quyền thực hiện hành động này"

    ValidationError:
      description: Dữ liệu gửi lên không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Dữ liệu không hợp lệ"
            errors:
              email: "Email không đúng định dạng"

    NotFoundError:
      description: Không tìm thấy tài nguyên
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Không tìm thấy người dùng"

    ConflictError:
      description: Xung đột dữ liệu (email/username trùng)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Email đã được sử dụng"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
