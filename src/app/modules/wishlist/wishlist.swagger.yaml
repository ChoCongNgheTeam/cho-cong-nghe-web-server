openapi: 3.0.0
info:
  title: Wishlist API
  version: 1.0.0
  description: API để quản lý danh sách sản phẩm yêu thích

tags:
  - name: Wishlist
    description: Các API liên quan đến danh sách yêu thích

paths:
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Lấy danh sách yêu thích của người dùng (Có phân trang)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Số trang hiện tại (Mặc định là 1)
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Số lượng sản phẩm trên mỗi trang (Mặc định là 10)
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              example:
                data: []
                meta:
                  total: 25
                  page: 1
                  limit: 10
                  totalPages: 3
                message: "Lấy danh sách yêu thích thành công"
  /wishlist/add:
    post:
      tags:
        - Wishlist
      summary: Thêm sản phẩm vào danh sách yêu thích
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Thành công
        '400':
          description: Lỗi dữ liệu hoặc sản phẩm ngừng kinh doanh
        '404':
          description: Không tìm thấy sản phẩm
        '409':
          description: Sản phẩm đã có trong wishlist
  /wishlist/remove:
    delete:
      tags:
        - Wishlist
      summary: Xoá sản phẩm khỏi danh sách yêu thích
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Thành công
  /wishlist/check/{productId}:
    get:
      tags:
        - Wishlist
      summary: Kiểm tra sản phẩm có trong danh sách
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thành công

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT