openapi: 3.0.0
info:
  title: Wishlist API
  version: 1.1.0
  description: |
    API quản lý danh sách sản phẩm yêu thích.
    - Hỗ trợ phân trang (Pagination).
    - Tích hợp Pricing Orchestrator để tự động tính giá khuyến mãi.
    - Lấy kèm hình ảnh đại diện và các thông số nổi bật (Highlights) của sản phẩm.

tags:
  - name: Wishlist
    description: Các API liên quan đến danh sách yêu thích

paths:
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Lấy danh sách yêu thích của người dùng (Có phân trang & Tính giá khuyến mãi)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Số trang hiện tại (Mặc định là 1)
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Số lượng sản phẩm trên mỗi trang (Mặc định là 10)
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Lấy danh sách yêu thích thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
                  meta:
                    $ref: '#/components/schemas/WishlistPaginationMeta'
                  message:
                    type: string
                    example: "Lấy danh sách yêu thích thành công"

  /wishlist/add:
    post:
      tags:
        - Wishlist
      summary: Thêm sản phẩm vào danh sách yêu thích
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Thêm thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WishlistItem'
                  message:
                    type: string
                    example: "Thêm thành công"
        '400':
          description: Lỗi dữ liệu hoặc sản phẩm đã ngừng kinh doanh
        '404':
          description: Không tìm thấy sản phẩm
        '409':
          description: Sản phẩm đã có trong wishlist

  /wishlist/remove:
    delete:
      tags:
        - Wishlist
      summary: Xoá sản phẩm khỏi danh sách yêu thích
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Xoá thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Xoá thành công"
        '404':
          description: Không tìm thấy sản phẩm trong danh sách yêu thích

  /wishlist/check/{productId}:
    get:
      tags:
        - Wishlist
      summary: Kiểm tra sản phẩm có trong danh sách yêu thích hay không
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Kiểm tra thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      isInWishlist:
                        type: boolean
                  message:
                    type: string
                    example: "Kiểm tra thành công"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    WishlistPaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 25
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 3

    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        price:
          type: object
          description: Thông tin giá đã được tính toán qua hệ thống khuyến mãi (Orchestrator). Có thể null nếu không có biến thể.
        product:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Laptop Gaming ASUS ROG"
            slug:
              type: string
              example: "laptop-gaming-asus-rog"
            isActive:
              type: boolean
              example: true
            brandId:
              type: string
              format: uuid
            ratingAverage:
              type: number
              example: 4.8
            ratingCount:
              type: integer
              example: 156
            category:
              type: object
              description: Cây danh mục để tính giá
              properties:
                id:
                  type: string
                  format: uuid
                parent:
                  type: object
            variants:
              type: array
              description: Biến thể mặc định của sản phẩm
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  price:
                    type: number
            productSpecifications:
              type: array
              description: Các thông số kỹ thuật nổi bật (Highlights)
              items:
                type: object
                properties:
                  value:
                    type: string
                    example: "16GB"
                  specification:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "RAM"
                      unit:
                        type: string
                        nullable: true
                        example: "GB"
            img:
              type: array
              description: Danh sách hình ảnh của sản phẩm
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  color:
                    type: string
                    example: "Đen"
                  imageUrl:
                    type: string
                    nullable: true
                  altText:
                    type: string
                    nullable: true
                  position:
                    type: integer
                    example: 0