paths:
  # ==================== PUBLIC ENDPOINTS ====================

  /categories:
    get:
      summary: Lấy danh sách tất cả danh mục (Public)
      tags: [Public - Categories]
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/ParentIdQuery"
        - $ref: "#/components/parameters/IsFeaturedQuery"
        - $ref: "#/components/parameters/IsActiveQuery"
        - $ref: "#/components/parameters/SortByQuery"
        - $ref: "#/components/parameters/SortOrderQuery"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
                  message:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/roots:
    get:
      summary: Lấy danh sách danh mục gốc (Public)
      tags: [Public - Categories]
      description: Trả về các danh mục cấp 1 (parentId = null) đang active
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/IsFeaturedQuery"
        - $ref: "#/components/parameters/SortByQuery"
        - $ref: "#/components/parameters/SortOrderQuery"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
                  message:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/featured:
    get:
      summary: Lấy danh mục nổi bật (Public)
      tags: [Public - Categories]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 6
            maximum: 50
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
                  message:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/tree:
    get:
      summary: Lấy toàn bộ cây danh mục (Public)
      tags: [Public - Categories]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryTree"
                  message:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/slug/{slug}:
    get:
      summary: Lấy thông tin danh mục theo slug
      tags: [Public - Categories]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CategoryWithChildren"
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==================== ADMIN ENDPOINTS ====================

  /categories/admin/all:
    get:
      summary: Lấy tất cả danh mục (Admin/Staff)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/ParentIdQuery"
        - $ref: "#/components/parameters/IsFeaturedQuery"
        - $ref: "#/components/parameters/IsActiveQuery"
        - $ref: "#/components/parameters/IncludeDeletedQuery"
        - $ref: "#/components/parameters/SortByQuery"
        - $ref: "#/components/parameters/SortOrderQuery"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin/roots:
    get:
      summary: Lấy danh mục gốc (Admin/Staff)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin:
    post:
      summary: Tạo danh mục mới (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                parentId:
                  type: string
                  format: uuid
                  description: "UUID của danh mục cha, hoặc bỏ trống"
                description:
                  type: string
                  maxLength: 500
                imageUrl:
                  type: string
                  format: binary
                  description: File ảnh tải lên
                position:
                  type: integer
                  minimum: 0
                isFeatured:
                  type: boolean
                  default: false
                isActive:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Category"
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin/{id}:
    get:
      summary: Chi tiết 1 danh mục (Admin/Staff)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Category"
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Cập nhật danh mục (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                parentId:
                  type: string
                  format: uuid
                description:
                  type: string
                imageUrl:
                  type: string
                  format: binary
                  description: File ảnh mới
                position:
                  type: integer
                isFeatured:
                  type: boolean
                isActive:
                  type: boolean
                removeImage:
                  type: boolean
                  description: Xóa ảnh hiện tại nếu truyền true
      responses:
        "200":
          description: Cập nhật thành công
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Chuyển danh mục vào thùng rác (Soft Delete) (Admin/Staff)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Xóa mềm thành công
        "400":
          description: Không thể xóa vì đang chứa sản phẩm hoặc danh mục con

  /categories/admin/reorder:
    post:
      summary: Sắp xếp lại thứ tự danh mục (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, newPosition]
              properties:
                categoryId:
                  type: string
                  format: uuid
                newPosition:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Sắp xếp thành công

  /categories/admin/trash/categories:
    get:
      summary: Lấy danh sách danh mục đã xóa mềm (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Thành công

  /categories/admin/{id}/restore:
    post:
      summary: Khôi phục danh mục từ thùng rác (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Khôi phục thành công

  /categories/admin/{id}/permanent:
    delete:
      summary: Xóa vĩnh viễn danh mục (Admin Only)
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Xóa vĩnh viễn thành công
        "400":
          description: Phải chuyển vào thùng rác trước khi xóa vĩnh viễn

  # ==================== TEMPLATE, ATTRIBUTES & SPECS ====================

  /categories/admin/attributes/all:
    get:
      summary: Lấy tất cả attributes có trong hệ thống (Admin/Staff)
      tags: [Admin - Category Attributes & Specs]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công

  /categories/admin/attributes/{attributeId}/options:
    get:
      summary: Lấy danh sách options của một attribute (Admin/Staff)
      tags: [Admin - Category Attributes & Specs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: attributeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thành công

  /categories/admin/specifications/all:
    get:
      summary: Lấy tất cả specifications có trong hệ thống (Admin/Staff)
      tags: [Admin - Category Attributes & Specs]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công

  /categories/admin/{categoryId}/template:
    get:
      summary: Lấy template (attributes + specs) của danh mục (Admin/Staff)
      tags: [Admin - Category Attributes & Specs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công

components:
  parameters:
    SearchQuery:
      in: query
      name: search
      schema:
        type: string
      description: Tìm kiếm theo tên hoặc mô tả
    ParentIdQuery:
      in: query
      name: parentId
      schema:
        type: string
        format: uuid
      description: Lọc theo danh mục cha
    IsFeaturedQuery:
      in: query
      name: isFeatured
      schema:
        type: boolean
    IsActiveQuery:
      in: query
      name: isActive
      schema:
        type: boolean
    IncludeDeletedQuery:
      in: query
      name: includeDeleted
      schema:
        type: boolean
        default: false
      description: Lấy cả những bản ghi đã xóa mềm (Chỉ Admin/Staff)
    SortByQuery:
      in: query
      name: sortBy
      schema:
        type: string
        enum: [name, position, createdAt]
        default: position
    SortOrderQuery:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        imagePath:
          type: string
          nullable: true
        position:
          type: integer
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        parentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    CategoryTree:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: "#/components/schemas/CategoryTree"

    CategoryWithChildren:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: "#/components/schemas/Category"
            parent:
              $ref: "#/components/schemas/Category"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

  responses:
    UnauthorizedError:
      description: Chưa xác thực
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Không có quyền
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Lỗi máy chủ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token"