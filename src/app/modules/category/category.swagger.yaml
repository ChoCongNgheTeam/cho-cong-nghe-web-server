paths:
  # ==================== PUBLIC ENDPOINTS ====================
  /categories/roots:
    get:
      summary: Lấy root categories cho home page
      tags: [Categories - Public]
      description: Lấy danh sách các danh mục gốc (không có parent) để hiển thị trên trang chủ
      responses:
        "200":
          description: Lấy danh sách root categories thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  message:
                    type: string
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Điện thoại"
                    slug: "dien-thoai"
                    description: "Các sản phẩm điện thoại di động"
                    categoryImage: "https://example.com/phone.jpg"
                    position: 0
                    isActive: true
                    parentId: null
                    createdAt: "2025-12-23T10:00:00.000Z"
                    updatedAt: "2025-12-23T10:00:00.000Z"
                  - id: "b2c3d4e5-f6g7-8901-bcde-fg2345678901"
                    name: "Laptop"
                    slug: "laptop"
                    description: "Máy tính xách tay"
                    categoryImage: "https://example.com/laptop.jpg"
                    position: 1
                    isActive: true
                    parentId: null
                    createdAt: "2025-12-23T10:00:00.000Z"
                    updatedAt: "2025-12-23T10:00:00.000Z"
                message: "Lấy danh sách root categories thành công"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/tree:
    get:
      summary: Lấy category tree cho menu (nested structure)
      tags: [Categories - Public]
      description: Lấy cây danh mục đầy đủ với cấu trúc lồng nhau để hiển thị menu
      responses:
        "200":
          description: Lấy category tree thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryTree"
                  message:
                    type: string
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Điện thoại"
                    slug: "dien-thoai"
                    categoryImage: "https://example.com/phone.jpg"
                    position: 0
                    isActive: true
                    children:
                      - id: "c3d4e5f6-g7h8-9012-cdef-gh3456789012"
                        name: "iPhone"
                        slug: "iphone"
                        categoryImage: "https://example.com/iphone.jpg"
                        position: 0
                        isActive: true
                        children: []
                      - id: "d4e5f6g7-h8i9-0123-defg-hi4567890123"
                        name: "Samsung"
                        slug: "samsung"
                        categoryImage: "https://example.com/samsung.jpg"
                        position: 1
                        isActive: true
                        children: []
                message: "Lấy category tree thành công"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/slug/{slug}:
    get:
      summary: Lấy category theo slug (có children)
      tags: [Categories - Public]
      description: Lấy thông tin chi tiết category theo slug kèm danh sách children
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug của category
          example: "dien-thoai"
      responses:
        "200":
          description: Lấy category thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CategoryWithChildren"
                  message:
                    type: string
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  name: "Điện thoại"
                  slug: "dien-thoai"
                  description: "Các sản phẩm điện thoại di động"
                  categoryImage: "https://example.com/phone.jpg"
                  position: 0
                  isActive: true
                  parentId: null
                  createdAt: "2025-12-23T10:00:00.000Z"
                  updatedAt: "2025-12-23T10:00:00.000Z"
                  children:
                    - id: "c3d4e5f6-g7h8-9012-cdef-gh3456789012"
                      name: "iPhone"
                      slug: "iphone"
                      position: 0
                      isActive: true
                message: "Lấy category thành công"
        "404":
          description: Không tìm thấy category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không tìm thấy category với slug: dien-thoai"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==================== ADMIN ENDPOINTS ====================
  /categories/admin/all:
    get:
      summary: Lấy tất cả categories (Admin only - flat list với _count)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      description: Lấy danh sách tất cả categories dạng flat list, có số lượng sản phẩm và subcategories
      responses:
        "200":
          description: Lấy danh sách categories thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryWithCount"
                  total:
                    type: integer
                  message:
                    type: string
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Điện thoại"
                    slug: "dien-thoai"
                    description: "Các sản phẩm điện thoại di động"
                    categoryImage: "https://example.com/phone.jpg"
                    position: 0
                    isActive: true
                    parentId: null
                    createdAt: "2025-12-23T10:00:00.000Z"
                    updatedAt: "2025-12-23T10:00:00.000Z"
                    _count:
                      products: 150
                      children: 5
                  - id: "c3d4e5f6-g7h8-9012-cdef-gh3456789012"
                    name: "iPhone"
                    slug: "iphone"
                    description: "Điện thoại iPhone"
                    categoryImage: "https://example.com/iphone.jpg"
                    position: 0
                    isActive: true
                    parentId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    createdAt: "2025-12-23T10:00:00.000Z"
                    updatedAt: "2025-12-23T10:00:00.000Z"
                    _count:
                      products: 45
                      children: 0
                total: 2
                message: "Lấy tất cả categories thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin/roots:
    get:
      summary: Lấy root categories cho admin (Admin only - có số lượng sub)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      description: Lấy danh sách root categories cho admin, có số lượng subcategories
      responses:
        "200":
          description: Lấy root categories thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryWithCount"
                  message:
                    type: string
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Điện thoại"
                    slug: "dien-thoai"
                    position: 0
                    isActive: true
                    _count:
                      children: 5
                      products: 150
                message: "Lấy root categories thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin/{id}:
    get:
      summary: Lấy category detail với children (Admin only)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      description: Lấy thông tin chi tiết category kèm danh sách children (khi click vào root category)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của category
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Lấy category detail thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CategoryWithChildren"
                  message:
                    type: string
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  name: "Điện thoại"
                  slug: "dien-thoai"
                  description: "Các sản phẩm điện thoại di động"
                  categoryImage: "https://example.com/phone.jpg"
                  position: 0
                  isActive: true
                  parentId: null
                  createdAt: "2025-12-23T10:00:00.000Z"
                  updatedAt: "2025-12-23T10:00:00.000Z"
                  children:
                    - id: "c3d4e5f6-g7h8-9012-cdef-gh3456789012"
                      name: "iPhone"
                      slug: "iphone"
                      position: 0
                      isActive: true
                message: "Lấy category detail thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Không tìm thấy category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không tìm thấy category"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Cập nhật category (Admin only)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của category
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Tên danh mục
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                  description: ID của category cha (null nếu là root)
                description:
                  type: string
                  maxLength: 500
                  description: Mô tả danh mục
                categoryImage:
                  type: string
                  format: uri
                  description: URL hình ảnh danh mục
                position:
                  type: integer
                  minimum: 0
                  description: Vị trí sắp xếp
                isActive:
                  type: boolean
                  description: Trạng thái hoạt động
            example:
              name: "Điện thoại thông minh"
              description: "Các sản phẩm smartphone cao cấp"
              categoryImage: "https://example.com/smartphone.jpg"
              isActive: true
      responses:
        "200":
          description: Cập nhật category thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Category"
                  message:
                    type: string
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  name: "Điện thoại thông minh"
                  slug: "dien-thoai-thong-minh"
                  description: "Các sản phẩm smartphone cao cấp"
                  categoryImage: "https://example.com/smartphone.jpg"
                  position: 0
                  isActive: true
                  parentId: null
                  createdAt: "2025-12-23T10:00:00.000Z"
                  updatedAt: "2025-12-23T15:00:00.000Z"
                message: "Cập nhật category thành công"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Không tìm thấy category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không tìm thấy category"
        "409":
          description: Xung đột dữ liệu (tên trùng, không thể set parent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Tên category đã tồn tại"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Xóa category (Admin only)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      description: Xóa category (chỉ xóa được nếu không có sản phẩm và subcategories)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của category
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "204":
          description: Xóa category thành công (không có nội dung trả về)
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Không tìm thấy category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không tìm thấy category"
        "409":
          description: Không thể xóa (có sản phẩm hoặc subcategories)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không thể xóa category vì còn 5 subcategories"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin:
    post:
      summary: Tạo category mới (Admin only)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Tên danh mục
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                  description: ID của category cha (bỏ trống nếu là root)
                description:
                  type: string
                  maxLength: 500
                  description: Mô tả danh mục
                categoryImage:
                  type: string
                  format: uri
                  description: URL hình ảnh danh mục
                position:
                  type: integer
                  minimum: 0
                  description: Vị trí sắp xếp (tự động nếu không truyền)
                isActive:
                  type: boolean
                  default: true
                  description: Trạng thái hoạt động
            example:
              name: "Tablet"
              description: "Máy tính bảng"
              categoryImage: "https://example.com/tablet.jpg"
              isActive: true
      responses:
        "201":
          description: Tạo category thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Category"
                  message:
                    type: string
              example:
                data:
                  id: "e5f6g7h8-i9j0-1234-efgh-ij5678901234"
                  name: "Tablet"
                  slug: "tablet"
                  description: "Máy tính bảng"
                  categoryImage: "https://example.com/tablet.jpg"
                  position: 2
                  isActive: true
                  parentId: null
                  createdAt: "2025-12-23T16:00:00.000Z"
                  updatedAt: "2025-12-23T16:00:00.000Z"
                message: "Tạo category thành công"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          description: Tên category đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Tên category đã tồn tại"
        "500":
          $ref: "#/components/responses/ServerError"

  /categories/admin/reorder:
    post:
      summary: Sắp xếp lại position của category (Admin only)
      tags: [Categories - Admin]
      security:
        - bearerAuth: []
      description: Thay đổi vị trí hiển thị của category (dùng cho drag & drop)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryId
                - newPosition
              properties:
                categoryId:
                  type: string
                  format: uuid
                  description: ID của category cần di chuyển
                newPosition:
                  type: integer
                  minimum: 0
                  description: Vị trí mới (bắt đầu từ 0)
            example:
              categoryId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              newPosition: 3
      responses:
        "200":
          description: Sắp xếp lại position thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Sắp xếp lại position thành công"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Không tìm thấy category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Không tìm thấy category"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        categoryImage:
          type: string
          format: uri
          nullable: true
        position:
          type: integer
        isActive:
          type: boolean
        parentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryWithCount:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            _count:
              type: object
              properties:
                products:
                  type: integer
                  description: Số lượng sản phẩm trong category
                children:
                  type: integer
                  description: Số lượng subcategories

    CategoryTree:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        categoryImage:
          type: string
          format: uri
          nullable: true
        position:
          type: integer
        isActive:
          type: boolean
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTree"

    CategoryWithChildren:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            children:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  slug:
                    type: string
                  position:
                    type: integer
                  isActive:
                    type: boolean

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: string

  responses:
    UnauthorizedError:
      description: Chưa xác thực hoặc token không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Không có token, truy cập bị từ chối"

    ForbiddenError:
      description: Không có quyền truy cập (chỉ ADMIN)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Bạn không có quyền truy cập tài nguyên này"

    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Dữ liệu không hợp lệ"
            errors:
              name: "Tên danh mục phải từ 2 ký tự"
              categoryImage: "URL hình ảnh không hợp lệ"

    ServerError:
      description: Lỗi server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Đã xảy ra lỗi, vui lòng thử lại sau"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token (không cần thêm 'Bearer ' ở đầu)"
