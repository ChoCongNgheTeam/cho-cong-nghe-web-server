openapi: 3.0.0
info:
  title: Brand API
  version: 1.0.0
  description: API quản lý thương hiệu (brands)

servers:
  - url: /api/brands
    description: Brand API base path

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token (không cần thêm 'Bearer ' ở đầu)"

  schemas:
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID thương hiệu
        name:
          type: string
          description: Tên thương hiệu
        slug:
          type: string
          description: Slug của thương hiệu
        description:
          type: string
          nullable: true
          description: Mô tả thương hiệu
        imagePath:
          type: string
          nullable: true
          description: Đường dẫn hình ảnh
        imageUrl:
          type: string
          nullable: true
          description: URL hình ảnh
        isFeatured:
          type: boolean
          description: Thương hiệu nổi bật
        isActive:
          type: boolean
          description: Trạng thái hoạt động
        createdAt:
          type: string
          format: date-time
          description: Ngày tạo
        updatedAt:
          type: string
          format: date-time
          description: Ngày cập nhật

    BrandWithProductCount:
      allOf:
        - $ref: "#/components/schemas/Brand"
        - type: object
          properties:
            _count:
              type: object
              properties:
                products:
                  type: integer
                  description: Số lượng sản phẩm

    CreateBrandRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Tên thương hiệu
          example: "Apple"
        description:
          type: string
          maxLength: 500
          description: Mô tả thương hiệu
          example: "Thương hiệu công nghệ hàng đầu thế giới"
        image:
          type: string
          format: binary
          description: File hình ảnh thương hiệu (upload file)
        isFeatured:
          type: boolean
          default: false
          description: Đánh dấu là thương hiệu nổi bật
        isActive:
          type: boolean
          default: true
          description: Trạng thái hoạt động

    UpdateBrandRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Tên thương hiệu
        description:
          type: string
          maxLength: 500
          description: Mô tả thương hiệu
        image:
          type: string
          format: binary
          description: File hình ảnh thương hiệu mới (upload file)
        removeImage:
          type: boolean
          description: Xóa hình ảnh hiện tại (true để xóa)
        isFeatured:
          type: boolean
          description: Đánh dấu là thương hiệu nổi bật
        isActive:
          type: boolean
          description: Trạng thái hoạt động

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

paths:
  # Public routes

  /brands/:
    get:
      tags:
        - Public - Brands
      summary: Lấy danh sách thương hiệu active
      description: Lấy tất cả thương hiệu đang hoạt động, sắp xếp theo featured và tên
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                            imagePath:
                              type: string
                              nullable: true
                            imageUrl:
                              type: string
                              nullable: true
                            isFeatured:
                              type: boolean

  /brands/featured:
    get:
      tags:
        - Public - Brands
      summary: Lấy thương hiệu nổi bật
      description: Lấy danh sách thương hiệu nổi bật cho trang chủ
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 6
          description: Số lượng thương hiệu cần lấy
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                            imagePath:
                              type: string
                              nullable: true
                            imageUrl:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true

  /brands/slug/{slug}:
    get:
      tags:
        - Public - Brands
      summary: Lấy thương hiệu theo slug
      description: Lấy thông tin chi tiết thương hiệu bằng slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug của thương hiệu
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BrandWithProductCount"
        "404":
          description: Không tìm thấy thương hiệu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Admin routes

  /brands/admin/all:
    get:
      tags:
        - Public - Admin
      summary: Lấy tất cả thương hiệu (Admin)
      description: Lấy danh sách tất cả thương hiệu bao gồm cả inactive
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BrandWithProductCount"
        "401":
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/admin/{id}:
    get:
      tags:
        - Public - Admin
      summary: Lấy chi tiết thương hiệu (Admin)
      description: Lấy thông tin chi tiết thương hiệu theo ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của thương hiệu
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BrandWithProductCount"
        "404":
          description: Không tìm thấy thương hiệu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags:
        - Public - Admin
      summary: Cập nhật thương hiệu (Admin)
      description: Cập nhật thông tin thương hiệu với khả năng upload hình ảnh mới
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của thương hiệu
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Tên thương hiệu
                description:
                  type: string
                  maxLength: 500
                  description: Mô tả thương hiệu
                image:
                  type: string
                  format: binary
                  description: File hình ảnh thương hiệu mới (nếu muốn đổi ảnh)
                removeImage:
                  type: boolean
                  description: Đặt true để xóa hình ảnh hiện tại
                isFeatured:
                  type: boolean
                  description: Đánh dấu là thương hiệu nổi bật
                isActive:
                  type: boolean
                  description: Trạng thái hoạt động
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Brand"
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Không tìm thấy thương hiệu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tên thương hiệu đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Public - Admin
      summary: Xóa thương hiệu (Admin)
      description: Xóa thương hiệu (chỉ khi không có sản phẩm liên kết)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID của thương hiệu
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Không thể xóa vì có sản phẩm liên kết
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Không tìm thấy thương hiệu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/admin:
    post:
      tags:
        - Public - Admin
      summary: Tạo thương hiệu mới (Admin)
      description: Tạo một thương hiệu mới với upload hình ảnh
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Tên thương hiệu
                  example: "Apple"
                description:
                  type: string
                  maxLength: 500
                  description: Mô tả thương hiệu
                  example: "Thương hiệu công nghệ hàng đầu thế giới"
                image:
                  type: string
                  format: binary
                  description: File hình ảnh thương hiệu
                isFeatured:
                  type: boolean
                  default: false
                  description: Đánh dấu là thương hiệu nổi bật
                isActive:
                  type: boolean
                  default: true
                  description: Trạng thái hoạt động
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Brand"
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tên thương hiệu đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
