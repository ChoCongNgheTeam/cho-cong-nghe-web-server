openapi: 3.0.0
info:
  title: Comment API
  version: 1.0.0
  description: API quản lý bình luận (Comment)

servers:
  - url: /api/v1/comments
    description: Comment API endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token (không cần thêm 'Bearer ' ở đầu)"

  schemas:
    CommentTargetType:
      type: string
      enum: [PRODUCT, BLOG, POST] # tùy theo hệ thống của bạn, có thể điều chỉnh
      description: Loại đối tượng mà comment hướng tới

    CommentStatus:
      type: string
      enum: [pending, approved, rejected]
      description: Trạng thái duyệt bình luận

    CommentAuthor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        avatar:
          type: string
          nullable: true

    CommentCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        targetType:
          $ref: "#/components/schemas/CommentTargetType"
        targetId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        author:
          $ref: "#/components/schemas/CommentAuthor"
        isApproved:
          type: boolean
        createdAt:
          type: string
          format: date-time
        repliesCount:
          type: integer
          description: Số lượng reply trực tiếp

    CommentDetail:
      allOf:
        - $ref: "#/components/schemas/CommentCard"
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
            replies:
              type: array
              items:
                $ref: "#/components/schemas/CommentCard"
              nullable: true

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

tags:
  - name: Public - Comments
    description: API công khai cho bình luận
  - name: Authenticated - Comments
    description: API dành cho người dùng đã đăng nhập
  - name: Admin - Comments
    description: API quản trị bình luận

paths:
  /comments:
    get:
      tags:
        - Public - Comments
      summary: Lấy danh sách bình luận công khai (đã duyệt)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: targetType
          schema:
            $ref: "#/components/schemas/CommentTargetType"
        - in: query
          name: targetId
          schema:
            type: string
            format: uuid
        - in: query
          name: parentId
          schema:
            type: string
            format: uuid
            nullable: true
            description: Để lấy reply của một comment cụ thể, truyền null để lấy root comments
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommentCard"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                  message:
                    type: string
        "400":
          description: Tham số không hợp lệ
        "500":
          description: Lỗi server

    post:
      tags:
        - Authenticated - Comments
      summary: Tạo bình luận mới (yêu cầu đăng nhập)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - targetType
                - targetId
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                targetType:
                  $ref: "#/components/schemas/CommentTargetType"
                targetId:
                  type: string
                  format: uuid
                parentId:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        "201":
          description: Tạo bình luận thành công (có thể đang chờ duyệt)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/CommentCard"
                  message:
                    type: string
        "400":
          description: Dữ liệu không hợp lệ
        "401":
          description: Chưa xác thực
        "500":
          description: Lỗi server

  /comments/{id}/replies:
    get:
      tags:
        - Public - Comments
      summary: Lấy danh sách reply của một bình luận
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommentCard"
                  message:
                    type: string
        "404":
          description: Không tìm thấy comment cha
        "500":
          description: Lỗi server

  /comments/{id}:
    delete:
      tags:
        - Authenticated - Comments
      summary: Người dùng xóa bình luận của chính mình
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Chưa xác thực
        "403":
          description: Không phải bình luận của bạn
        "404":
          description: Không tìm thấy
        "500":
          description: Lỗi server

  /comments/admin/all:
    get:
      tags:
        - Admin - Comments
      summary: Lấy tất cả bình luận (bao gồm chưa duyệt) - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: targetType
          schema:
            $ref: "#/components/schemas/CommentTargetType"
        - in: query
          name: targetId
          schema:
            type: string
            format: uuid
        - in: query
          name: isApproved
          schema:
            type: boolean
        - in: query
          name: parentId
          schema:
            type: string
            format: uuid
            nullable: true
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommentCard"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                  message:
                    type: string
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "500":
          description: Lỗi server

  /comments/admin/{id}:
    get:
      tags:
        - Admin - Comments
      summary: Lấy chi tiết bình luận (Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/CommentDetail"
                  message:
                    type: string
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "404":
          description: Không tìm thấy
        "500":
          description: Lỗi server

    patch:
      tags:
        - Admin - Comments
      summary: Cập nhật bình luận (Admin) - thường dùng để chỉnh nội dung
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                isApproved:
                  type: boolean
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/CommentDetail"
                  message:
                    type: string
        "400":
          description: Dữ liệu không hợp lệ
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "404":
          description: Không tìm thấy
        "500":
          description: Lỗi server

    delete:
      tags:
        - Admin - Comments
      summary: Admin xóa bình luận
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "404":
          description: Không tìm thấy
        "500":
          description: Lỗi server

  /comments/admin/{id}/approve:
    patch:
      tags:
        - Admin - Comments
      summary: Duyệt / từ chối một bình luận
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - isApproved
              properties:
                isApproved:
                  type: boolean
      responses:
        "200":
          description: Cập nhật trạng thái duyệt thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Dữ liệu không hợp lệ
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "404":
          description: Không tìm thấy
        "500":
          description: Lỗi server

  /comments/admin/bulk/approve:
    patch:
      tags:
        - Admin - Comments
      summary: Duyệt / từ chối hàng loạt bình luận
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - commentIds
                - isApproved
              properties:
                commentIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                isApproved:
                  type: boolean
      responses:
        "200":
          description: Duyệt hàng loạt thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Dữ liệu không hợp lệ
        "401":
          description: Chưa xác thực
        "403":
          description: Không có quyền
        "500":
          description: Lỗi server
