openapi: 3.0.0
info:
  title: Cart API
  version: 1.0.0
  description: |
    API quản lý giỏ hàng cho cả người dùng đã đăng nhập (DB) và khách (localStorage).
    - User: Lưu trữ trực tiếp trong Database.
    - Guest: Lưu trữ tại localStorage phía FE, gửi lên BE để validate giá và tồn kho.

tags:
  - name: Cart
    description: Các thao tác với giỏ hàng và quản lý session

paths:
  /cart/get:
    post:
      summary: Lấy thông tin giỏ hàng (Hỗ trợ cả Guest và User)
      description: |
        - Nếu có Token: Lấy từ DB.
        - Nếu là Guest: Gửi danh sách items từ localStorage lên body để BE validate thông tin mới nhất.
        - Rate limit: 30 requests/phút.
      tags:
        - Cart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/LocalStorageItem"
      responses:
        "200":
          description: Lấy giỏ hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CartSummary"
                      - $ref: "#/components/schemas/ValidatedLocalStorageCart"
                  message:
                    type: string

  /cart/validate-item:
    post:
      summary: Kiểm tra 1 sản phẩm trước khi thêm vào localStorage (Guest)
      description: Check tồn kho, giá, màu sắc của 1 variant.
      tags:
        - Cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productVariantId
                - quantity
              properties:
                productVariantId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Sản phẩm hợp lệ
        "400":
          description: Hết hàng hoặc sản phẩm ngừng kinh doanh

  /cart/sync:
    post:
      summary: Đồng bộ giỏ hàng từ localStorage vào DB (Khi Login)
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/LocalStorageItem"
      responses:
        "200":
          description: Đồng bộ thành công

  /cart:
    post:
      summary: Thêm sản phẩm vào DB (Chỉ cho User)
      description: "Rate limit: 10 requests/phút."
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartInput"
      responses:
        "201":
          description: Thêm thành công
        "401":
          description: Chưa đăng nhập

    delete:
      summary: Xóa sạch giỏ hàng (Chỉ cho User)
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Đã làm trống giỏ hàng

  /cart/{cartItemId}:
    parameters:
      - in: path
        name: cartItemId
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Cập nhật số lượng item trong DB
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Cập nhật thành công

    delete:
      summary: Xóa 1 sản phẩm khỏi DB
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Xóa thành công

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AddToCartInput:
      type: object
      required:
        - productVariantId
        - quantity
      properties:
        productVariantId:
          type: string
          format: uuid
        quantity:
          type: integer

    LocalStorageItem:
      type: object
      properties:
        productVariantId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
        # Các field khác FE có thể gửi nhưng BE chủ yếu dùng 2 field trên

    CartItemResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        productVariantId: { type: string, format: uuid }
        productName: { type: string }
        image: { type: string }
        color: { type: string }
        colorValue: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        totalPrice: { type: number }
        availableQuantity: { type: integer }

    CartSummary:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemResponse"
        totalItems: { type: integer }
        subtotal: { type: number }

    ValidatedLocalStorageCart:
      type: object
      properties:
        validItems:
          type: array
          items:
            $ref: "#/components/schemas/CartItemResponse"
        invalidItems:
          type: array
          items:
            type: object
            properties:
              productVariantId: { type: string }
              reason: { type: string }
        hasErrors: { type: boolean }

  responses:
    ServerError:
      description: Lỗi hệ thống
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: Lỗi server }