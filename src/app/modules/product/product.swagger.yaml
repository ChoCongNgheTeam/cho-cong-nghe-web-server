openapi: 3.0.0
info:
  title: Product API
  version: 2.0.0
  description: API quản lý sản phẩm cho hệ thống thương mại điện tử (Đã đồng bộ đầy đủ các API Public, Sale/Promotions và Admin/Trash)

servers:
  - url: /api/v1
    description: Base URL

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token"

  schemas:
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    VariantImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        imageUrl:
          type: string
          format: uri
        altText:
          type: string
        position:
          type: integer

    Inventory:
      type: object
      properties:
        quantity:
          type: integer
        reservedQuantity:
          type: integer
        available:
          type: integer

    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        price:
          type: number
        soldCount:
          type: integer
        isDefault:
          type: boolean
        isActive:
          type: boolean
        available:
          type: boolean
        stockStatus:
          type: string
          enum: [in_stock, low_stock, out_of_stock]
        images:
          type: array
          items:
            $ref: "#/components/schemas/VariantImage"

    ProductCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        priceOrigin:
          type: number
        thumbnail:
          type: string
          format: uri
        rating:
          type: object
          properties:
            average:
              type: number
            count:
              type: integer
        isFeatured:
          type: boolean
        isNew:
          type: boolean
        highlights:
          type: array
          items:
            type: object
        inStock:
          type: boolean

    ProductDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          $ref: "#/components/schemas/Brand"
        category:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        currentVariant:
          $ref: "#/components/schemas/ProductVariant"
        rating:
          type: object
        viewsCount:
          type: integer
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            avatarImage:
              type: string

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
        message:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

tags:
  - name: Public - Products
    description: API xem danh sách và chi tiết sản phẩm
  - name: Public - Campaigns & Promotions
    description: API liên quan đến Flash Sale, Sản phẩm mới, Bán chạy, Lịch Sale
  - name: Admin - Products
    description: API quản lý sản phẩm cho Admin và Staff

paths:
  # ==================== PUBLIC - PRODUCTS ====================
  /products:
    get:
      summary: Lấy danh sách sản phẩm
      tags: [Public - Products]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: brandId
          schema:
            type: string
            format: uuid
        - in: query
          name: isFeatured
          schema:
            type: boolean
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: minRating
          schema:
            type: number
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, name, price, viewsCount, ratingAverage, soldCount]
            default: createdAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Success

  /products/slug/{slug}:
    get:
      summary: Lấy chi tiết sản phẩm theo slug
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

  /products/slug/{slug}/variant:
    get:
      summary: Lấy chi tiết biến thể cụ thể của sản phẩm
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: code
          schema:
            type: string
      responses:
        "200":
          description: Success

  /products/slug/{slug}/gallery:
    get:
      summary: Lấy danh sách ảnh (gallery) của sản phẩm
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

  /products/slug/{slug}/specifications:
    get:
      summary: Lấy thông số kỹ thuật của sản phẩm
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

  /products/slug/{slug}/related:
    get:
      summary: Lấy danh sách sản phẩm tương tự
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Success

  /products/slug/{slug}/reviews:
    get:
      summary: Lấy đánh giá của sản phẩm
      tags: [Public - Products]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: rating
          schema:
            type: integer
      responses:
        "200":
          description: Success

  # ==================== PUBLIC - CAMPAIGNS & PROMOTIONS ====================
  /products/flash-sale:
    get:
      summary: Lấy danh sách sản phẩm đang Flash Sale
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success

  /products/sale-categories:
    get:
      summary: Lấy danh mục có chứa sản phẩm Sale
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Success

  /products/upcoming-promotions:
    get:
      summary: Lấy danh sách các chương trình khuyến mãi sắp diễn ra
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Success

  /products/best-selling:
    get:
      summary: Lấy danh sách sản phẩm bán chạy nhất
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Success

  /products/new-arrivals:
    get:
      summary: Lấy danh sách sản phẩm mới ra mắt
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: daysAgo
          schema:
            type: integer
            default: 30
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Success

  /products/sale-schedule:
    get:
      summary: Lấy lịch sale / khuyến mãi
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Success

  /products/promotion/{promotionId}:
    get:
      summary: Lấy danh sách sản phẩm theo Promotion ID
      tags: [Public - Campaigns & Promotions]
      parameters:
        - in: path
          name: promotionId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Success

  # ==================== ADMIN & STAFF ====================
  /products/admin/all:
    get:
      summary: Lấy tất cả sản phẩm (Cho Admin/Staff)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: brandId
          schema:
            type: string
            format: uuid
        - in: query
          name: includeDeleted
          schema:
            type: boolean
            default: false
          description: Lấy cả những sản phẩm đã bị xóa mềm (thùng rác)
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /products/admin/{id}:
    get:
      summary: Chi tiết 1 sản phẩm (Admin/Staff)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success

    patch:
      summary: Cập nhật thông tin sản phẩm (Admin Only)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                brandId:
                  type: string
                  format: uuid
                categoryId:
                  type: string
                  format: uuid
                variants:
                  type: string
                  description: JSON string
                specifications:
                  type: string
                  description: JSON string
                colorImages:
                  type: string
                  description: JSON string array của màu sắc
                # Multer bắt files tự do qua upload.any(), swagger biểu thị tượng trưng:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Success

    delete:
      summary: Chuyển sản phẩm vào thùng rác - Soft Delete (Admin/Staff)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Đã chuyển vào thùng rác

  /products/admin:
    post:
      summary: Tạo sản phẩm mới (Admin Only)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                brandId:
                  type: string
                  format: uuid
                categoryId:
                  type: string
                  format: uuid
                variants:
                  type: string
                  description: JSON string
                specifications:
                  type: string
                  description: JSON string
                colorImages:
                  type: string
                  description: JSON string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Tạo thành công

  /products/admin/trash/products:
    get:
      summary: Lấy danh sách sản phẩm trong thùng rác (Admin Only)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Success

  /products/admin/{id}/restore:
    post:
      summary: Khôi phục sản phẩm từ thùng rác (Admin Only)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Khôi phục thành công

  /products/admin/{id}/permanent:
    delete:
      summary: Xóa vĩnh viễn sản phẩm khỏi Database (Admin Only)
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Xóa vĩnh viễn thành công