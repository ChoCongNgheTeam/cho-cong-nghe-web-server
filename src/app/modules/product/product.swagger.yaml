openapi: 3.0.0
info:
  title: Product API
  version: 1.0.0
  description: API quản lý sản phẩm cho hệ thống thương mại điện tử

servers:
  - url: http://localhost:5000/api
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    VariantImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        imageUrl:
          type: string
          format: uri
        altText:
          type: string
        position:
          type: integer

    Inventory:
      type: object
      properties:
        quantity:
          type: integer
        reservedQuantity:
          type: integer
        available:
          type: integer

    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        price:
          type: number
        soldCount:
          type: integer
        isDefault:
          type: boolean
        isActive:
          type: boolean
        available:
          type: boolean
        stockStatus:
          type: string
          enum: [in_stock, low_stock, out_of_stock]
        inventory:
          $ref: "#/components/schemas/Inventory"
        images:
          type: array
          items:
            $ref: "#/components/schemas/VariantImage"

    ProductCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        brand:
          $ref: "#/components/schemas/Brand"
        price:
          type: number
        thumbnail:
          type: string
          format: uri
        rating:
          type: object
          properties:
            average:
              type: number
            count:
              type: integer
        isFeatured:
          type: boolean
        isNew:
          type: boolean
        highlights:
          type: array
          items:
            type: object
        inStock:
          type: boolean

    ProductDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          $ref: "#/components/schemas/Brand"
        category:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        currentVariant:
          $ref: "#/components/schemas/ProductVariant"
        rating:
          type: object
        viewsCount:
          type: integer
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            avatarImage:
              type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
        message:
          type: string

paths:
  /products:
    get:
      summary: Lấy danh sách sản phẩm (Public)
      tags:
        - Public - Products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Trang hiện tại
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
            maximum: 50
          description: Số lượng items mỗi trang
        - in: query
          name: search
          schema:
            type: string
          description: Tìm kiếm theo tên hoặc mô tả
        - in: query
          name: category
          schema:
            type: string
          description: Filter theo category slug
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
          description: Filter theo category ID
        - in: query
          name: brandId
          schema:
            type: string
            format: uuid
          description: Filter theo brand ID
        - in: query
          name: isFeatured
          schema:
            type: boolean
          description: Filter sản phẩm nổi bật
        - in: query
          name: minPrice
          schema:
            type: number
          description: Giá tối thiểu
        - in: query
          name: maxPrice
          schema:
            type: number
          description: Giá tối đa
        - in: query
          name: minRating
          schema:
            type: number
            minimum: 0
            maximum: 5
          description: Rating tối thiểu
        - in: query
          name: inStock
          schema:
            type: boolean
          description: Chỉ lấy sản phẩm còn hàng
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, name, price, viewsCount, ratingAverage, soldCount]
            default: createdAt
          description: Sắp xếp theo field
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Thứ tự sắp xếp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProductCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/slug/{slug}:
    get:
      summary: Lấy chi tiết sản phẩm theo slug
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Product slug
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ProductDetail"
                  message:
                    type: string
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/slug/{slug}/variant:
    get:
      summary: Lấy chi tiết variant cụ thể
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: code
          schema:
            type: string
          description: Variant code (SKU)
        - in: query
          name: color
          schema:
            type: string
          description: Dynamic attribute - color
        - in: query
          name: storage
          schema:
            type: string
          description: Dynamic attribute - storage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ProductVariant"
                  message:
                    type: string
        "404":
          description: Variant not found

  /products/slug/{slug}/gallery:
    get:
      summary: Lấy gallery ảnh của sản phẩm
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VariantImage"
                  message:
                    type: string

  /products/slug/{slug}/specifications:
    get:
      summary: Lấy thông số kỹ thuật
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      specifications:
                        type: array
                        items:
                          type: object
                          properties:
                            groupName:
                              type: string
                            items:
                              type: array
                              items:
                                type: object
                  message:
                    type: string

  /products/slug/{slug}/related:
    get:
      summary: Lấy sản phẩm tương tự
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 8
            maximum: 12
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProductCard"
                  message:
                    type: string

  /products/slug/{slug}/reviews:
    get:
      summary: Lấy đánh giá của sản phẩm
      tags:
        - Public - Products
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 20
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, rating]
            default: createdAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Review"

  /products/admin/all:
    get:
      summary: Lấy tất cả sản phẩm (Admin)
      tags:
        - Admin - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: brandId
          schema:
            type: string
            format: uuid
        - in: query
          name: isFeatured
          schema:
            type: boolean
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, name, price, viewsCount, ratingAverage]
            default: createdAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Admin role required

  /products/admin/{id}:
    get:
      summary: Lấy chi tiết sản phẩm theo ID (Admin)
      tags:
        - Admin - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ProductDetail"
                  message:
                    type: string
        "404":
          description: Product not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    patch:
      summary: Cập nhật sản phẩm
      tags:
        - Admin - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                brandId:
                  type: string
                  format: uuid
                  description: Brand ID
                categoryId:
                  type: string
                  format: uuid
                  description: Category ID
                name:
                  type: string
                  minLength: 3
                  description: Tên sản phẩm
                description:
                  type: string
                  description: Mô tả sản phẩm
                isFeatured:
                  type: boolean
                  description: Sản phẩm nổi bật
                isActive:
                  type: boolean
                  description: Kích hoạt sản phẩm
                variants:
                  type: string
                  description: JSON string của variants array
                  example: '[{"id":"uuid","price":28990000,"quantity":120}]'
                specifications:
                  type: string
                  description: JSON string của specifications array
                  example: '[{"specificationId":"uuid","value":"A17 Pro","isHighlight":true}]'
                variant_0:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Ảnh cho variant 0 (có thể upload nhiều ảnh)
                variant_1:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Ảnh cho variant 1
            encoding:
              variants:
                contentType: application/json
              specifications:
                contentType: application/json
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ProductDetail"
                  message:
                    type: string
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Product not found

    delete:
      summary: Xóa sản phẩm
      tags:
        - Admin - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Xóa sản phẩm thành công
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Product not found

  /products/admin:
    post:
      summary: Tạo sản phẩm mới
      tags:
        - Admin - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - brandId
                - categoryId
                - name
                - variants
              properties:
                brandId:
                  type: string
                  format: uuid
                  description: Brand ID
                  example: df656f59-85c6-4a1e-81c0-c318d9c05fc7
                categoryId:
                  type: string
                  format: uuid
                  description: Category ID (single category)
                  example: 90dfb31f-fd25-49db-88c6-0acd531c5eee
                name:
                  type: string
                  minLength: 3
                  description: Tên sản phẩm
                  example: iPhone 15 Pro Max
                description:
                  type: string
                  description: Mô tả sản phẩm
                  example: iPhone 15 Pro Max chính hãng VN/A, chip A17 Pro
                isFeatured:
                  type: boolean
                  description: Sản phẩm nổi bật
                  default: false
                  example: true
                isActive:
                  type: boolean
                  description: Kích hoạt sản phẩm
                  default: true
                  example: true
                variants:
                  type: string
                  description: JSON string của variants array (bắt buộc có ít nhất 1 variant với isDefault=true)
                  example: '[{"code":"IP15PM-256-BLACK","price":29990000,"quantity":100,"isDefault":true,"isActive":true,"variantAttributes":[{"attributeOptionId":"c4bed20c-494c-4f90-a54b-c60629fe829e"},{"attributeOptionId":"d08118ab-4aca-4a6e-bdf2-ce4a3fc13792"}]}]'
                specifications:
                  type: string
                  description: JSON string của specifications array
                  example: '[{"specificationId":"1fa98b73-8238-482f-b5c2-899f02de2cda","value":"A17 Pro","isHighlight":true},{"specificationId":"5243c8ca-464e-4ff6-9c36-497d0ccf54d2","value":"8GB","isHighlight":false}]'
                variant_0:
                  type: string
                  format: binary
                  description: Ảnh cho variant đầu tiên (có thể upload nhiều ảnh với cùng field name)
                variant_1:
                  type: string
                  format: binary
                  description: Ảnh cho variant thứ 2
            encoding:
              variants:
                contentType: application/json
              specifications:
                contentType: application/json
      responses:
        "201":
          description: Created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ProductDetail"
                  message:
                    type: string
                    example: Tạo sản phẩm thành công
              examples:
                success:
                  summary: Tạo sản phẩm thành công
                  value:
                    success: true
                    data:
                      id: uuid-product-id
                      name: iPhone 15 Pro Max
                      slug: iphone-15-pro-max
                      brand:
                        id: df656f59-85c6-4a1e-81c0-c318d9c05fc7
                        name: Apple
                        slug: apple
                      category:
                        - id: 90dfb31f-fd25-49db-88c6-0acd531c5eee
                          name: Điện thoại
                          slug: dien-thoai
                    message: Tạo sản phẩm thành công
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              examples:
                validation_error:
                  summary: Lỗi validation
                  value:
                    success: false
                    message: Dữ liệu không hợp lệ
                    errors:
                      - path: [variants]
                        message: Phải có đúng 1 biến thể mặc định
                missing_field:
                  summary: Thiếu field bắt buộc
                  value:
                    success: false
                    message: Dữ liệu không hợp lệ
                    errors:
                      - path: [brandId]
                        message: Required
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

tags:
  - name: Public - Products
    description: Public endpoints cho sản phẩm
  - name: Admin - Products
    description: Admin endpoints quản lý sản phẩm (yêu cầu authentication & ADMIN role)
