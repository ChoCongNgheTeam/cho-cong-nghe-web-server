paths:
  # ==================== PUBLIC ENDPOINTS (USER) ====================
  /orders/my:
    get:
      summary: Lấy danh sách đơn hàng của người dùng hiện tại
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      description: Lấy tất cả đơn hàng thuộc về user đang đăng nhập, sắp xếp theo ngày đặt hàng mới nhất
      responses:
        "200":
          description: Lấy danh sách đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderDetail"
                  message:
                    type: string
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    subtotalAmount: "1500000.00"
                    shippingFee: "20000.00"
                    voucherDiscount: "100000.00"
                    totalAmount: "1420000.00"
                    orderStatus: "PENDING"
                    paymentStatus: "UNPAID"
                    orderDate: "2025-12-30T10:00:00.000Z"
                    updatedAt: "2025-12-30T10:00:00.000Z"
                    user:
                      id: "user-uuid-123"
                      fullName: "Nguyễn Văn A"
                      email: "nguyenvana@example.com"
                      phone: "0901234567"
                    paymentMethod:
                      id: "pm-uuid-001"
                      name: "Thanh toán khi nhận hàng (COD)"
                      description: "Khách hàng thanh toán bằng tiền mặt khi nhận hàng"
                    shippingAddress:
                      contactName: "Nguyễn Văn A"
                      phone: "0901234567"
                      detailAddress: "123 Đường ABC"
                      provinceId: "01"
                      districtId: "001"
                      wardId: "00001"
                    orderItems:
                      - quantity: 1
                        unitPrice: "1500000.00"
                        productVariant:
                          code: "IPHONE16-PRO-BLACK"
                          price: "1500000.00"
                          product:
                            name: "iPhone 16 Pro"
                            slug: "iphone-16-pro"
                          variantAttributes:
                            - attributeOption:
                                value: "Đen"
                                attribute:
                                  name: "Màu sắc"
                          images:
                            - imageUrl: "https://example.com/iphone16-black.jpg"
                message: "Lấy danh sách đơn hàng thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /orders/my/{id}:
    get:
      summary: Lấy chi tiết một đơn hàng của người dùng
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: ID của đơn hàng
      description: Lấy chi tiết đơn hàng, chỉ cho phép xem đơn hàng thuộc về chính user đó
      responses:
        "200":
          description: Lấy chi tiết đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderDetail"
                  message:
                    type: string
              example:
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  subtotalAmount: "1500000.00"
                  shippingFee: "20000.00"
                  voucherDiscount: "100000.00"
                  totalAmount: "1420000.00"
                  orderStatus: "PENDING"
                  paymentStatus: "UNPAID"
                  orderDate: "2025-12-30T10:00:00.000Z"
                  updatedAt: "2025-12-30T10:00:00.000Z"
                  voucher:
                    code: "GIAM100K"
                    description: "Giảm 100k cho đơn từ 1 triệu"
                  orderItems:
                    - quantity: 1
                      unitPrice: "1500000.00"
                      productVariant:
                        code: "IPHONE16-PRO-BLACK"
                        price: "1500000.00"
                        product:
                          name: "iPhone 16 Pro"
                          slug: "iphone-16-pro"
                message: "Lấy chi tiết đơn hàng thành công"
        "400":
          description: Không có quyền xem đơn hàng này
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /orders:
    post:
      summary: Tạo đơn hàng mới
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      description: Tạo đơn hàng từ giỏ hàng của user. Hệ thống sẽ kiểm tra tồn kho, địa chỉ, voucher, phương thức thanh toán...
      responses:
        "201":
          description: Tạo đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderDetail"
                  message:
                    type: string
              example:
                data:
                  id: "new-order-uuid-999"
                  totalAmount: "1420000.00"
                  orderStatus: "PENDING"
                  paymentStatus: "UNPAID"
                message: "Tạo đơn hàng thành công"
        "400":
          description: Lỗi validate (không đủ hàng, voucher không hợp lệ, địa chỉ không thuộc user...)
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==================== ADMIN ENDPOINTS ====================
  /orders/admin/all:
    get:
      summary: Lấy tất cả đơn hàng (Admin only)
      tags: [Orders - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      description: Lấy danh sách tất cả đơn hàng (có phân trang nếu cần mở rộng sau), sắp xếp theo ngày đặt mới nhất
      responses:
        "200":
          description: Lấy danh sách đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderDetail"
                  total:
                    type: integer
                    description: Tổng số đơn hàng (nếu có phân trang)
                  message:
                    type: string
              example:
                data: [{ ... }] # tương tự example ở trên nhưng có nhiều đơn
                total: 158
                message: "Lấy tất cả đơn hàng thành công"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

  /orders/admin/{id}:
    get:
      summary: Lấy chi tiết đơn hàng (Admin)
      tags: [Orders - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      description: Admin xem chi tiết bất kỳ đơn hàng nào
      responses:
        "200":
          description: Lấy chi tiết đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderDetail"
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      summary: Cập nhật đơn hàng (Admin)
      tags: [Orders - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderAdminRequest"
      description: Admin có thể cập nhật trạng thái đơn hàng, trạng thái thanh toán...
      responses:
        "200":
          description: Cập nhật đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderDetail"
                  message:
                    type: string
              example:
                message: "Cập nhật đơn hàng thành công"
        "400":
          description: Dữ liệu đầu vào không hợp lệ
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Xóa đơn hàng (Admin)
      tags: [Orders - Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      description: Xóa đơn hàng và hoàn lại tồn kho (nếu đơn chưa giao)
      responses:
        "200":
          description: Xóa đơn hàng thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Xóa đơn hàng thành công"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  schemas:
    OrderDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderCode:           
          type: string      
          description: "Mã đơn hàng hiển thị cho khách"
        subtotalAmount:
          type: string
          description: "Tổng tiền sản phẩm (decimal string)"
        shippingFee:
          type: string
        voucherDiscount:
          type: string
        totalAmount:
          type: string
        orderStatus:
          type: string
          enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, RETURNED]
        paymentStatus:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
        orderDate:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            email:
              type: string
            phone:
              type: string
        paymentMethod:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type: string
        voucher:
          type: object
          nullable: true
          properties:
            id:
              type: string
            code:
              type: string
            description:
              type: string
        shippingAddress:
          type: object
          properties:
            contactName:
              type: string
            phone:
              type: string
            detailAddress:
              type: string
            provinceId:
              type: string
            districtId:
              type: string
            wardId:
              type: string
        orderItems:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              quantity:
                type: integer
              unitPrice:
                type: string
              productVariant:
                type: object
                properties:
                  id:
                    type: string
                  code:
                    type: string
                  price:
                    type: string
                  product:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                  variantAttributes:
                    type: array
                    items:
                      type: object
                      properties:
                        attributeOption:
                          type: object
                          properties:
                            value:
                              type: string
                            attribute:
                              type: object
                              properties:
                                name:
                                  type: string
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        imageUrl:
                          type: string

    CreateOrderRequest:
      type: object
      required:
        - paymentMethodId
        - shippingAddressId
        - orderItems
      properties:
        paymentMethodId:
          type: string
          format: uuid
        voucherId:
          type: string
          format: uuid
          nullable: true
        shippingAddressId:
          type: string
          format: uuid
        orderItems:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productVariantId
              - quantity
            properties:
              productVariantId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1

    UpdateOrderAdminRequest:
      type: object
      properties:
        orderStatus:
          type: string
          enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, RETURNED]
        paymentStatus:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Nhập JWT token (không cần thêm 'Bearer ' ở đầu)"
