openapi: 3.0.0
info:
  title: Order API
  version: 4.0.0
  description: API quản lý Đơn hàng. Hỗ trợ Hủy Đơn (Cancel), Mua Lại (Re-order) và cơ chế Lưu Trữ (Archive) an toàn tuyệt đối cho Kho.

tags:
  - name: Orders - Public
    description: API dành cho người dùng cuối (Customer)
  - name: Orders - Staff/Admin
    description: API quản trị chung (Xem, Cập nhật trạng thái, Hủy đơn)
  - name: Orders - Admin Only
    description: API độc quyền của Admin (Tạo đơn hộ, Lưu trữ - Archive, Xóa cứng)

paths:
  # ==================== PUBLIC ENDPOINTS (USER) ====================
  /orders/my:
    get:
      summary: Lấy danh sách đơn hàng của tôi
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderDetail"
                  total:
                    type: integer

  /orders/my/{id}:
    get:
      summary: Xem chi tiết đơn hàng của tôi
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công

  /orders/my/{id}/cancel:
    post:
      summary: User Hủy đơn hàng
      description: Khách tự hủy đơn (chỉ được phép khi đang PENDING hoặc PROCESSING). Hệ thống tự động hoàn Kho.
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Hủy thành công
        "400":
          description: Đơn không thỏa điều kiện hủy

  /orders/my/{id}/reorder:
    post:
      summary: Mua lại (Re-order)
      description: Quét sản phẩm đơn cũ và tự động thêm vào Giỏ hàng hiện tại (có check tồn kho thực tế).
      tags: [Orders - Public]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      addedCount:
                        type: integer
                      outOfStockCount:
                        type: integer
                  message:
                    type: string

  # ==================== STAFF & ADMIN ENDPOINTS ====================
  /orders/admin/all:
    get:
      summary: Lấy danh sách toàn bộ đơn hàng
      tags: [Orders - Staff/Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
          description: Tìm theo mã đơn, sđt hoặc tên người nhận
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
        - in: query
          name: paymentStatus
          schema:
            type: string
            enum: [UNPAID, PAID, REFUNDED]
        - in: query
          name: includeDeleted
          schema:
            type: boolean
            default: false
          description: Nếu true sẽ lấy cả các đơn hàng đã bị lưu trữ (Archived)
      responses:
        "200":
          description: Thành công

  /orders/admin/{id}:
    get:
      summary: Xem chi tiết đơn hàng
      tags: [Orders - Staff/Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Thành công

    patch:
      summary: Cập nhật thông tin đơn hàng
      description: Không dùng API này để Hủy đơn. Hãy gọi API `/orders/admin/{id}/cancel` để được xử lý trả lại Tồn kho an toàn.
      tags: [Orders - Staff/Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderInput"
      responses:
        "200":
          description: Thành công

  /orders/admin/{id}/cancel:
    post:
      summary: Admin Hủy đơn hàng (Cancel)
      description: Admin hủy đơn hàng, hệ thống sẽ tự động hoàn lại số lượng Tồn Kho cho sản phẩm.
      tags: [Orders - Staff/Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Hủy thành công

  # ==================== ADMIN ONLY ENDPOINTS ====================
  /orders/admin:
    post:
      summary: Tạo đơn hàng (Tạo hộ khách)
      tags: [Orders - Admin Only]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Tạo thành công

  /orders/admin/archive/orders:
    get:
      summary: Lấy danh sách đơn hàng đã lưu trữ (Archived)
      tags: [Orders - Admin Only]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Thành công

  /orders/admin/{id}/archive:
    post:
      summary: Lưu trữ đơn hàng (Archive)
      description: Ẩn đơn hàng khỏi danh sách chính (Soft Delete). **Chỉ áp dụng cho đơn đã CANCELLED hoặc DELIVERED.** Không ảnh hưởng đến tồn kho.
      tags: [Orders - Admin Only]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archive thành công
        "400":
          description: Lỗi nếu đơn hàng đang ở trạng thái xử lý

  /orders/admin/{id}/unarchive:
    post:
      summary: Khôi phục đơn hàng đã lưu trữ (Unarchive)
      description: Đưa đơn hàng trở lại danh sách quản lý chính.
      tags: [Orders - Admin Only]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Khôi phục thành công

  /orders/admin/{id}/permanent:
    delete:
      summary: Xóa vĩnh viễn đơn hàng
      description: Đơn hàng phải nằm trong danh sách Archive (đã lưu trữ) trước khi được xóa cứng khỏi cơ sở dữ liệu.
      tags: [Orders - Admin Only]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Xóa cứng thành công

components:
  schemas:
    UpdateOrderInput:
      type: object
      properties:
        orderStatus:
          type: string
          enum: [PENDING, PROCESSING, SHIPPED, DELIVERED]
        paymentStatus:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
        shippingFee:
          type: number
        voucherDiscount:
          type: number

    CreateOrderInput:
      type: object
      description: "Phải cung cấp userId & shippingAddressId CÓ SẴN, HOẶC customerInfo & newAddress ĐỂ TẠO MỚI"
      properties:
        userId:
          type: string
          format: uuid
        shippingAddressId:
          type: string
          format: uuid
        customerInfo:
          type: object
          properties:
            fullName:
              type: string
            phone:
              type: string
            email:
              type: string
        newAddress:
          type: object
          properties:
            provinceId:
              type: string
              format: uuid
            wardId:
              type: string
              format: uuid
            detailAddress:
              type: string
        items:
          type: array
          items:
            type: object
            properties:
              productVariantId:
                type: string
                format: uuid
              quantity:
                type: integer
              unitPrice:
                type: number
        voucherCode:
          type: string
        shippingFee:
          type: number
        paymentMethodId:
          type: string
          format: uuid
        paymentStatus:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
        orderStatus:
          type: string
          enum: [PENDING, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
      required:
        - items
        - shippingFee
        - paymentMethodId
        - paymentStatus
        - orderStatus

    OrderDetail:
      type: object
      properties:
        id:
          type: string
        orderCode:
          type: string
        orderStatus:
          type: string
        totalAmount:
          type: number
        orderItems:
          type: array
          items:
            type: object

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT