<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>VNPay Payment Test</title>
  </head>

  <body>
    <h2>VNPay Checkout Test</h2>

    <button onclick="payWithVNPay()">Pay with VNPay</button>

    <pre id="result"></pre>

    <script>
      async function payWithVNPay() {
        const token = "...";

        const res = await fetch("http://localhost:5000/api/v1/payments/vnpay/create", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({
            orderId: "b20dafc2-b7d6-42ce-91d3-ea577a70e7c7",
            amount: 14839000,
            orderInfo: "Thanh toan don hang test",
          }),
        });

        const data = await res.json();

        document.getElementById("result").textContent = JSON.stringify(data, null, 2);

        if (data?.data?.paymentUrl) {
          window.location.href = data.data.paymentUrl;
        }
      }
    </script>
  </body>
</html>
