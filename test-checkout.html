<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Checkout Test</title>
  </head>
  <body>
    <h2>Checkout Test - Bank Transfer</h2>

    <button onclick="checkout()">Checkout</button>

    <h3>Result:</h3>
    <pre id="result"></pre>

    <div id="bank-info"></div>

    <script>
      async function checkout() {
        const token =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiIxOTBmYWVmMS0wNDJmLTQwMjItYjNkMi0zZjkxMDU0NGFiYmYiLCJyb2xlIjoiQ1VTVE9NRVIiLCJpYXQiOjE3NzIzNzMzMDAsImV4cCI6MTc3MjM3NDIwMH0.BJcH0AEAhiArvgU9dEFpd8yIAuyPIr_IFlWswIaXBdk"; // ⚠️ thay token login

        const res = await fetch("http://localhost:5000/api/v1/checkout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({
            paymentMethodId: "edbfa40e-92ac-46e9-b7ea-cb2c3fe6286f",
            shippingAddressId: "6dbc409c-6352-4932-acee-b7d58d12d9de",
          }),
        });

        const data = await res.json();

        document.getElementById("result").textContent = JSON.stringify(data, null, 2);

        if (data.data.bankTransferInfo) {
          const info = data.data.bankTransferInfo;

          document.getElementById("bank-info").innerHTML = `
      <h3>Bank Transfer Info</h3>
      <p><b>Bank:</b> ${info.bankName}</p>
      <p><b>Account:</b> ${info.accountNumber}</p>
      <p><b>Content:</b> ${info.content}</p>
      <p><b>Amount:</b> ${info.amount}</p>
      <img src="${info.qrCode}" width="300"/>
    `;
        }
      }
    </script>
  </body>
</html>
